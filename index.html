<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<style>
  :root {
    --black:#0a0a0a;--dark:#111;--card:#181818;--border:#252525;
    --gold:#e8c44a;--red:#e53935;--blue:#1e90ff;--green:#00c853;--purple:#ce93d8;
    --yt:#ff0000;--text:#f0f0f0;--muted:#888;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--text);font-family:'Cairo',sans-serif;}

  /* HERO */
  .hero{background:linear-gradient(135deg,#0a0a0a 0%,#1a1200 50%,#0a0a0a 100%);border-bottom:3px solid var(--gold);padding:50px 20px 40px;text-align:center;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(232,196,74,.03) 40px,rgba(232,196,74,.03) 80px);}
  .hero-badge{display:inline-block;background:var(--gold);color:#000;font-weight:900;font-size:12px;letter-spacing:3px;padding:5px 16px;border-radius:2px;margin-bottom:18px;}
  .hero h1{font-size:clamp(32px,5vw,64px);font-weight:900;line-height:1.1;margin-bottom:10px;}
  .hero h1 span{color:var(--gold);}
  .hero p{font-size:16px;color:var(--muted);max-width:460px;margin:0 auto 28px;}
  .hero-stats{display:flex;justify-content:center;gap:36px;flex-wrap:wrap;}
  .stat-num{font-size:34px;font-weight:900;color:var(--gold);display:block;}
  .stat-label{font-size:12px;color:var(--muted);}

  /* TABS */
  .tabs-wrapper{position:sticky;top:0;z-index:100;background:var(--dark);border-bottom:2px solid var(--border);padding:0 16px;}
  .tabs{display:flex;max-width:1100px;margin:0 auto;gap:4px;padding:10px 0;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;padding:9px 20px;border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .tab-btn:hover{color:var(--gold);border-color:var(--gold);}
  .tab-btn.active{background:var(--gold);border-color:var(--gold);color:#000;}

  /* PHASE */
  .phase{display:none;max-width:1100px;margin:0 auto;padding:36px 16px;}
  .phase.active{display:block;}
  .phase-header{display:flex;align-items:center;gap:18px;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .phase-num{width:64px;height:64px;background:var(--gold);color:#000;font-weight:900;font-size:26px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
  .phase-info h2{font-size:26px;font-weight:900;}
  .phase-info p{font-size:14px;color:var(--muted);margin-top:3px;}
  .phase-months{margin-right:auto;background:var(--card);border:1px solid var(--border);padding:7px 16px;border-radius:4px;font-size:13px;color:var(--gold);font-weight:700;}

  /* DAY CARD */
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden;}
  .day-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;user-select:none;transition:background .2s;}
  .day-header:hover{background:rgba(255,255,255,.03);}
  .day-num{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0;}
  .d1 .day-num{background:rgba(229,57,53,.18);color:var(--red);border:2px solid var(--red);}
  .d2 .day-num{background:rgba(30,144,255,.18);color:var(--blue);border:2px solid var(--blue);}
  .d3 .day-num{background:rgba(0,200,83,.18);color:var(--green);border:2px solid var(--green);}
  .d4 .day-num{background:rgba(232,196,74,.18);color:var(--gold);border:2px solid var(--gold);}
  .d5 .day-num{background:rgba(156,39,176,.18);color:var(--purple);border:2px solid #9c27b0;}
  .day-title-area{flex:1;}
  .day-title{font-size:19px;font-weight:900;}
  .day-sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .day-tag{padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;flex-shrink:0;}
  .d1 .day-tag{background:rgba(229,57,53,.12);color:var(--red);}
  .d2 .day-tag{background:rgba(30,144,255,.12);color:var(--blue);}
  .d3 .day-tag{background:rgba(0,200,83,.12);color:var(--green);}
  .d4 .day-tag{background:rgba(232,196,74,.12);color:var(--gold);}
  .d5 .day-tag{background:rgba(156,39,176,.12);color:var(--purple);}
  .chevron{font-size:18px;color:var(--muted);transition:transform .3s;}
  .day-card.open .chevron{transform:rotate(180deg);}
  .day-body{display:none;padding:0 20px 20px;}
  .day-card.open .day-body{display:block;}

  /* MUSCLE GROUP */
  .mg{margin-bottom:26px;}
  .mg-title{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--border);}
  .mg-title::before{content:'';display:block;width:4px;height:14px;background:var(--gold);border-radius:2px;}

  /* EXERCISE GRID */
  .ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}

  /* EXERCISE CARD */
  .ex-card{background:var(--dark);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:transform .2s,border-color .2s;display:flex;flex-direction:column;}
  .ex-card:hover{transform:translateY(-3px);border-color:var(--gold);}

  /* IMAGE AREA */
  .ex-img-wrap{width:100%;height:155px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  .ex-img-wrap img{width:100%;height:100%;object-fit:contain;padding:6px;transition:opacity .3s;}
  .ex-fallback{font-size:50px;display:none;position:absolute;}

  /* INFO */
  .ex-info{padding:10px 12px 6px;}
  .ex-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3;}
  .ex-sets{font-size:12px;color:var(--gold);font-weight:600;}

  /* YOUTUBE BUTTON */
  .yt-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:8px 10px 10px;padding:8px 12px;background:rgba(255,0,0,0.1);border:1px solid rgba(255,0,0,0.3);border-radius:6px;color:var(--yt);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;text-decoration:none;transition:all .2s;cursor:pointer;}
  .yt-btn:hover{background:var(--yt);color:#fff;border-color:var(--yt);}
  .yt-icon{width:18px;height:13px;flex-shrink:0;}

  /* NOTE */
  .note{background:rgba(232,196,74,.06);border:1px solid rgba(232,196,74,.2);border-radius:6px;padding:12px 16px;font-size:14px;color:var(--muted);margin-bottom:18px;}

  footer{text-align:center;padding:28px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);}

  @media(max-width:580px){
    .ex-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}
    .ex-img-wrap{height:120px;}
  }
</style>
</head>

<div class="hero">
  <div class="hero-badge">POWER · DEFINITION · EXPLOSION</div>

// ─── Build exercise card (image + YouTube button) ───
function C(name, sets, imgKey, emoji, ytQuery) {
  const src = imgKey ? (IMG[imgKey] || null) : null;
  const searchQ = ytQuery || name;
  return `<div class="ex-card">
    <div class="ex-img-wrap">
      ${src ? `<img src="${src}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
      <div class="ex-fallback" style="${src ? '' : 'display:flex'}">${emoji}</div>
    </div>
    <div class="ex-info">
      <div class="ex-name">${name}</div>
      <div class="ex-sets">${sets}</div>
    </div>
    <a class="yt-btn" href="${ytUrl(searchQ)}" target="_blank" rel="noopener">
      ${YT_ICON} شوف على YouTube
    </a>
  </div>`;
}

function G(title, cards) {
  return `<div class="mg"><div class="mg-title">${title}</div><div class="ex-grid">${cards.join('')}</div></div>`;
}

// ─── RENDER ───
const app = document.getElementById('app');
PHASES.forEach((phase, pi) => {
  let html = `<div class="phase ${pi===0?'active':''}" id="phase-${pi+1}">
    <div class="phase-header">
      <div class="phase-num">${phase.num}</div>
      <div class="phase-info"><h2>${phase.title}</h2><p>${phase.sub}</p></div>
      <div class="phase-months">${phase.months}</div>
    </div>`;

  phase.days.forEach((day, di) => {
    html += `<div class="day-card ${day.cls}${di===0?' open':''}">
      <div class="day-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="day-num">${day.n}</div>
        <div class="day-title-area">
          <div class="day-title">${day.title}</div>
          <div class="day-sub">${day.sub}</div>
        </div>
        <span class="day-tag">${day.tag}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="day-body">
        ${day.notes.map(n=>`<div class="note">${n}</div>`).join('')}
        ${day.groups.join('')}
      </div>
    </div>`;
  });

  html += `</div>`;
  app.innerHTML += html;
});

function showPhase(n) {
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('phase-'+n).classList.add('active');
  document.querySelectorAll('.tab-btn')[n-1].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
